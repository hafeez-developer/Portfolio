name: Deploy portfolio-app

on:
  push:
    branches:
      - main

concurrency:
  group: portfolio-app-production-deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: hafeez143h/portfolio-app:latest

  deploy-to-ec2:
    name: Deploy on EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy latest image over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            echo "[1/5] Pulling latest image..."
            docker pull hafeez143h/portfolio-app:latest

            echo "[2/5] Stopping old container (if running)..."
            docker stop portfolio-app || true

            echo "[3/5] Removing old container (if exists)..."
            docker rm portfolio-app || true

            echo "[4/5] Starting new container..."
            docker run -d \
              --name portfolio-app \
              --restart unless-stopped \
              -p 80:3001 \
              hafeez143h/portfolio-app:latest

            echo "[5/5] Deployment complete."
            docker ps --filter "name=portfolio-app"
